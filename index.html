<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kalender JS</title>
</head>
<body>
    <div class="header">
        <h1 class="header-name">Kalender JS</h1>
        <div class="text-container">
            <p class="text">Heute ist <span id="tagDesJahres">...</span>. Tag seit Beginn der Umschulung.</p>
        </div>    
    </div>
<div class="calendar-container">
    <div class="calendar-navigation">
        <button type="button" id="prevMonth">←</button>
        <h2 id="aktuel-monat"></h2>
        <button type="button" id="nextMonth">→</button>
    </div>
    <div id="calendarGrid" class="calendar-grid"></div>
</div>
<div class="todayIs">
        <div id="holiday-banner"></div>
    <h2>Historische Ereignisse des Tages:</h2>
    <p id="ereignisse">...</p> 
</div>
<footer class="footer">
   <img class="logo" src="Bilder/cdemy logo.jpg" alt="cdemy">
    <p>All right! 2026</p>
</footer>
    
    <script src="script.js"></script>
</body>
</html>
